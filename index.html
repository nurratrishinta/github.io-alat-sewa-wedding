<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login | Sewa Alat Wedding</title>

    <link rel="icon" type="image/png" sizes="128x128"
        href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICON MATA -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            width: 380px;
            border-radius: 15px;
            background: linear-gradient(160deg, #b0b9ff, #e7eafc);
            color: #1e293b;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        .btn-login {
            background: linear-gradient(90deg, #2563eb, #1e40af);
            color: white;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card login-card p-4 text-center">

        <img src="https://cdn-icons-png.flaticon.com/512/2948/2948033.png"
            class="mx-auto mb-3" width="80" style="border-radius: 50%;">

        <h4 class="fw-bold mb-1">Selamat Datang Di Aplikasi</h4>
        <h4 class="fw-bold mb-1">Sewa Alat Wedding</h4>
        <p class="text-muted">Silakan login terlebih dahulu</p>

        <form method="POST" id="loginForm">

            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control"
                    value="shintaaa@gmail.com" required>
            </div>

            <!-- PASSWORD + ICON MATA -->
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" required>

                    <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">Login</button>

            <div class="text-center mt-3">
                <p class="mb-0 fw-bold">Belum punya akun?</p>
                <a class="text-primary fw-bold" href="#" id="registerBtn">Buat Sekarang</a>
            </div>

        </form>

    </div>

    <script>
        // Data user (untuk simulasi login)
        const users = [
            { email: "shintaaa@gmail.com", password: "shinta123", nama: "Shinta Aulia", role: "peminjam", id_user: 1 },
            { email: "admin@wedding.com", password: "admin123", nama: "Admin Wedding", role: "admin", id_user: 2 },
            { email: "petugas@wedding.com", password: "petugas123", nama: "Petugas", role: "petugas", id_user: 3 },
            { email: "peminjam@wedding.com", password: "user123", nama: "Peminjam", role: "peminjam", id_user: 4 }
        ];

        // Toggle password visibility
        function togglePassword() {
            var password = document.getElementById("password");
            var icon = document.getElementById("toggleIcon");

            if (password.type === "password") {
                password.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                password.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validasi tidak boleh kosong
            if (email === '' || password === '') {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email dan password wajib diisi!',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Cari user berdasarkan email
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

            if (!user) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email Salah/Belum Terdaftar',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Cek password
            if (password !== user.password) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Password Salah',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Login berhasil - simpan session
            sessionStorage.setItem('user_session', JSON.stringify({
                login: true,
                id_user: user.id_user,
                email: user.email,
                nama: user.nama,
                role: user.role
            }));

            // Tampilkan pesan sukses dan redirect sesuai role
            let successMessage = "";

            switch (user.role) {
                case 'admin':
                    successMessage = "Berhasil login sebagai Admin!";
                    break;
                case 'petugas':
                    successMessage = "Berhasil login sebagai Petugas!";
                    break;
                case 'peminjam':
                    successMessage = "Berhasil login sebagai Peminjam!";
                    break;
                default:
                    successMessage = "Login berhasil!";
            }

            Swal.fire({
                icon: 'success',
                title: 'Login Berhasil',
                text: successMessage,
                confirmButtonColor: '#2563eb',
                timer: 1500,
                showConfirmButton: true
            }).then(() => {
                // Simulasi redirect - tampilkan dashboard di halaman yang sama
                showDashboard(user);
            });
        });

        // Fungsi untuk menampilkan dashboard (simulasi halaman setelah login)
        function showDashboard(user) {
            const card = document.querySelector('.login-card');
            
            let dashboardContent = '';
            
            if (user.role === 'admin') {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-person-badge" style="font-size: 48px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Admin</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <ul class="text-start">
                            <li>📊 Kelola Data User</li>
                            <li>📦 Kelola Alat Wedding</li>
                            <li>📝 Laporan Transaksi</li>
                            <li>⚙️ Pengaturan Sistem</li>
                        </ul>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            } else if (user.role === 'petugas') {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-clipboard-check" style="font-size: 48px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Petugas</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <ul class="text-start">
                            <li>✅ Verifikasi Peminjaman</li>
                            <li>📋 Update Status Alat</li>
                            <li>📅 Jadwal Pengembalian</li>
                            <li>📊 Monitoring Peminjaman</li>
                        </ul>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            } else {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-box-seam" style="font-size: 48px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Daftar Alat Wedding</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <ul class="text-start">
                            <li>🔍 Lihat Katalog Alat</li>
                            <li>📝 Ajukan Peminjaman</li>
                            <li>📌 Riwayat Sewa</li>
                            <li>💳 Pembayaran</li>
                        </ul>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            }
            
            card.innerHTML = dashboardContent;
        }

        // Fungsi logout
        function logout() {
            sessionStorage.removeItem('user_session');
            location.reload();
        }

        // Cek apakah sudah login sebelumnya
        const savedSession = sessionStorage.getItem('user_session');
        if (savedSession) {
            const user = JSON.parse(savedSession);
            if (user.login) {
                showDashboard(user);
            }
        }

        // Tombol register
        document.getElementById('registerBtn').addEventListener('click', function(e) {
            e.preventDefault();
            Swal.fire({
                title: 'Buat Akun Baru',
                text: 'Silakan hubungi administrator untuk membuat akun baru.',
                icon: 'info',
                confirmButtonText: 'Mengerti',
                confirmButtonColor: '#2563eb'
            });
        });
    </script>

</body>
</html>

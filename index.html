<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Login | Sewa Alat Wedding</title>

    <!-- FOTO ICON SAMA SEPERTI KODE ANDA -->
    <link rel="icon" type="image/png" sizes="128x128"
        href="https://raw.githubusercontent.com/your-image/1setwedding.webp">
    <!-- GANTI link di atas dengan path foto icon Anda sendiri -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICON MATA -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            /* GANTI DENGAN PATH FOTO BACKGROUND ANDA */
            background: url('https://raw.githubusercontent.com/your-image/1setwedding.webp') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            width: 380px;
            border-radius: 15px;
            background: linear-gradient(160deg, #b0b9ff, #e7eafc);
            color: #1e293b;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        .btn-login {
            background: linear-gradient(90deg, #2563eb, #1e40af);
            color: white;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
            width: 100%;
            padding: 8px 0;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        .input-group-text {
            cursor: pointer;
            background-color: white;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="card login-card p-4 text-center">

        <!-- FOTO LOGO SAMA SEPERTI KODE ANDA -->
        <img src="https://raw.githubusercontent.com/your-image/1setwedding.webp"
            class="mx-auto mb-3" width="80" style="border-radius: 10px;">
        <!-- GANTI link di atas dengan path foto logo Anda sendiri -->

        <h4 class="fw-bold mb-1">Selamat Datang Di Aplikasi Sewa Alat Wedding</h4>
        <p class="text-muted">Silakan login terlebih dahulu</p>

        <form id="loginForm">

            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control"
                    value="" required>
            </div>

            <!-- PASSWORD + ICON MATA -->
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" required>

                    <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login">Login</button>

            <div class="text-center mt-3">
                <p class="mb-0 fw-bold">Belum punya akun?</p>
                <a class="text-primary fw-bold" href="#" id="registerLink">Buat Sekarang</a>
            </div>

        </form>

    </div>

    <script>
        // ========== FUNGSI TOGGLE PASSWORD (MATA) ==========
        function togglePassword() {
            var password = document.getElementById("password");
            var icon = document.getElementById("toggleIcon");

            if (password.type === "password") {
                password.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                password.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }

        // ========== SIMULASI DATABASE USER (SESUAI DENGAN STRUKTUR PHP ANDA) ==========
        // Data ini sama seperti yang ada di database Anda nantinya
        const usersDatabase = [
            { id_user: 1, email: "admin@wedding.com", password: "admin123", nama: "Administrator", role: "admin" },
            { id_user: 2, email: "petugas@wedding.com", password: "petugas123", nama: "Petugas Wedding", role: "petugas" },
            { id_user: 3, email: "peminjam@wedding.com", password: "user123", nama: "Peminjam Wedding", role: "peminjam" }
        ];

        // Fungsi untuk mencari user berdasarkan email (seperti SELECT * FROM users WHERE email = ?)
        function findUserByEmail(email) {
            return usersDatabase.find(user => user.email.toLowerCase() === email.toLowerCase());
        }

        // ========== PROSES LOGIN (MENGUBAH LOGIKA PHP KE JAVASCRIPT) ==========
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Mencegah form submit (karena kita pakai JavaScript)

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            let error = '';

            // Validasi tidak boleh kosong (sama seperti PHP: if ($email === '' || $password === ''))
            if (email === '' || password === '') {
                error = "Email dan password wajib diisi!";
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: error,
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Cari user berdasarkan email (sama seperti query SELECT di PHP)
            const user = findUserByEmail(email);

            // Jika email tidak ditemukan (sama seperti $result->num_rows === 0)
            if (!user) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email Salah/Belum Terdaftar',
                    confirmButtonColor: '#2563eb'
                }).then(() => {
                    // Reset password seperti di PHP: window.location.href='login.php'
                    document.getElementById('password').value = '';
                });
                return;
            }

            // Cek password (sama seperti if ($password === $user['password']))
            if (password !== user.password) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Password Salah',
                    confirmButtonColor: '#2563eb'
                }).then(() => {
                    // Reset password seperti alert PHP lalu redirect ke login.php
                    document.getElementById('password').value = '';
                });
                return;
            }

            // ========== LOGIN BERHASIL ==========
            // Simpan session (sama seperti $_SESSION di PHP)
            sessionStorage.setItem('login', 'true');
            sessionStorage.setItem('id_user', user.id_user);
            sessionStorage.setItem('email', user.email);
            sessionStorage.setItem('nama', user.nama);
            sessionStorage.setItem('role', user.role);
            sessionStorage.setItem('login_success', `Berhasil login sebagai ${user.role === 'admin' ? 'Admin' : (user.role === 'petugas' ? 'Petugas' : 'Peminjam')}!`);

            // Redirect berdasarkan role (sama seperti switch case di PHP)
            let redirectUrl = '';
            let successMessage = '';

            switch (user.role.toLowerCase()) {
                case 'admin':
                    successMessage = "Berhasil login sebagai Admin!";
                    redirectUrl = "../../pages/dashboard/index.php";
                    break;
                case 'petugas':
                    successMessage = "Berhasil login sebagai Petugas!";
                    redirectUrl = "../../pages/persetujuan_peminjaman/index.php";
                    break;
                case 'peminjam':
                    successMessage = "Berhasil login sebagai Peminjam!";
                    redirectUrl = "../../pages/melihat_daftar_alat/index.php";
                    break;
                default:
                    successMessage = "Login berhasil!";
                    redirectUrl = "../../pages/index.php";
            }

            // Tampilkan pesan sukses dengan SweetAlert
            Swal.fire({
                icon: 'success',
                title: 'Login Berhasil',
                text: successMessage,
                confirmButtonColor: '#2563eb',
                timer: 1500,
                showConfirmButton: true
            }).then(() => {
                // Redirect ke halaman sesuai role
                // window.location.href = redirectUrl;
                
                // Untuk demo, tampilkan dashboard di halaman yang sama
                // (karena file HTML murni, kita simulasikan dashboard)
                showDashboard(user);
            });
        });

        // ========== FUNGSI MENAMPILKAN DASHBOARD (SIMULASI HALAMAN SETELAH LOGIN) ==========
        function showDashboard(user) {
            const card = document.querySelector('.login-card');
            
            let dashboardContent = '';
            
            if (user.role === 'admin') {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-shield-lock-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Admin</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-people-fill text-primary me-2"></i> <strong>Kelola Data User</strong></p>
                            <p><i class="bi bi-box-seam-fill text-primary me-2"></i> <strong>Kelola Alat Wedding</strong></p>
                            <p><i class="bi bi-file-text-fill text-primary me-2"></i> <strong>Laporan Transaksi</strong></p>
                            <p><i class="bi bi-gear-fill text-primary me-2"></i> <strong>Pengaturan Sistem</strong></p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3 rounded-pill">
                            <i class="bi bi-box-arrow-left me-2"></i>Logout
                        </button>
                    </div>
                `;
            } else if (user.role === 'petugas') {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-person-badge-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Petugas</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> <strong>Verifikasi Peminjaman</strong></p>
                            <p><i class="bi bi-arrow-repeat-fill text-success me-2"></i> <strong>Update Status Alat</strong></p>
                            <p><i class="bi bi-calendar-check-fill text-success me-2"></i> <strong>Jadwal Pengembalian</strong></p>
                            <p><i class="bi bi-graph-up-fill text-success me-2"></i> <strong>Monitoring Peminjaman</strong></p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3 rounded-pill">
                            <i class="bi bi-box-arrow-left me-2"></i>Logout
                        </button>
                    </div>
                `;
            } else {
                dashboardContent = `
                    <div style="text-align: center;">
                        <i class="bi bi-box-seam-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Daftar Alat Wedding</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-search-heart-fill text-danger me-2"></i> <strong>Lihat Katalog Alat</strong></p>
                            <p><i class="bi bi-pencil-square-fill text-danger me-2"></i> <strong>Ajukan Peminjaman</strong></p>
                            <p><i class="bi bi-clock-history-fill text-danger me-2"></i> <strong>Riwayat Sewa</strong></p>
                            <p><i class="bi bi-credit-card-fill text-danger me-2"></i> <strong>Pembayaran</strong></p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3 rounded-pill">
                            <i class="bi bi-box-arrow-left me-2"></i>Logout
                        </button>
                    </div>
                `;
            }
            
            card.innerHTML = dashboardContent;
        }

        // ========== FUNGSI LOGOUT ==========
        function logout() {
            // Hapus semua session (sama seperti session_destroy() di PHP)
            sessionStorage.clear();
            // Refresh halaman untuk kembali ke form login
            location.reload();
        }

        // ========== TOMBOL REGISTER (BUAT SEKARANG) ==========
        document.getElementById('registerLink').addEventListener('click', function(e) {
            e.preventDefault();
            Swal.fire({
                title: 'Buat Akun Baru',
                text: 'Silakan hubungi administrator untuk mendaftar akun baru.',
                icon: 'info',
                confirmButtonText: 'Mengerti',
                confirmButtonColor: '#2563eb'
            });
        });

        // ========== CEK APAKAH SUDAH LOGIN SEBELUMNYA ==========
        // Jika sudah login, langsung tampilkan dashboard (seperti session di PHP)
        const isLogin = sessionStorage.getItem('login');
        if (isLogin === 'true') {
            const savedUser = {
                id_user: sessionStorage.getItem('id_user'),
                email: sessionStorage.getItem('email'),
                nama: sessionStorage.getItem('nama'),
                role: sessionStorage.getItem('role')
            };
            showDashboard(savedUser);
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Login | Sewa Alat Wedding</title>

    <!-- GANTI DENGAN PATH FOTO ANDA SENDIRI -->
    <link rel="icon" type="image/png" sizes="128x128"
        href="../../templates-admin/material-dashboard-2/assets/img/1setwedding.webp">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ICON MATA -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            /* GANTI DENGAN PATH FOTO BACKGROUND ANDA SENDIRI */
            background: url('../../templates-admin/material-dashboard-2/assets/img/1setwedding.webp') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            width: 380px;
            border-radius: 15px;
            background: linear-gradient(160deg, #b0b9ff, #e7eafc);
            color: #1e293b;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        .btn-login {
            background: linear-gradient(90deg, #2563eb, #1e40af);
            color: white;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }

        .input-group-text {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card login-card p-4 text-center">

        <!-- GANTI DENGAN PATH LOGO/FOTO ANDA SENDIRI -->
        <img src="../../templates-admin/material-dashboard-2/assets/img/1setwedding.webp"
            class="mx-auto mb-3" width="80" style="border-radius: 10px;">

        <h4 class="fw-bold mb-1">Selamat Datang Di Aplikasi Sewa Alat Wedding</h4>
        <p class="text-muted">Silakan login terlebih dahulu</p>

        <form method="POST" id="loginForm">

            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-control"
                    value="" required>
            </div>

            <!-- PASSWORD + ICON MATA -->
            <div class="mb-3 text-start">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" required>

                    <span class="input-group-text" onclick="togglePassword()" style="cursor:pointer;">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100">Login</button>

            <div class="text-center mt-3">
                <p class="mb-0 fw-bold">Belum punya akun?</p>
                <a class="text-primary fw-bold" href="#" id="registerBtn">Buat Sekarang</a>
            </div>

        </form>

    </div>

    <script>
        // Data user untuk simulasi login (sesuai dengan database Anda nantinya)
        const users = [
            { email: "admin@wedding.com", password: "admin123", nama: "Admin Wedding", role: "admin", id_user: 1 },
            { email: "petugas@wedding.com", password: "petugas123", nama: "Petugas", role: "petugas", id_user: 2 },
            { email: "peminjam@wedding.com", password: "user123", nama: "Peminjam", role: "peminjam", id_user: 3 }
        ];

        // Toggle password visibility (fungsi mata)
        function togglePassword() {
            var password = document.getElementById("password");
            var icon = document.getElementById("toggleIcon");

            if (password.type === "password") {
                password.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                password.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        }

        // Handle form login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validasi tidak boleh kosong
            if (email === '' || password === '') {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email dan password wajib diisi!',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Cari user berdasarkan email
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

            if (!user) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Email Salah/Belum Terdaftar',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Cek password
            if (password !== user.password) {
                Swal.fire({
                    icon: 'error',
                    title: 'Login Gagal',
                    text: 'Password Salah',
                    confirmButtonColor: '#2563eb'
                });
                return;
            }

            // Login berhasil
            let successMessage = "";
            let redirectUrl = "";

            switch (user.role) {
                case 'admin':
                    successMessage = "Berhasil login sebagai Admin!";
                    redirectUrl = "../../pages/dashboard/index.php";
                    break;
                case 'petugas':
                    successMessage = "Berhasil login sebagai Petugas!";
                    redirectUrl = "../../pages/persetujuan_peminjaman/index.php";
                    break;
                case 'peminjam':
                    successMessage = "Berhasil login sebagai Peminjam!";
                    redirectUrl = "../../pages/melihat_daftar_alat/index.php";
                    break;
                default:
                    successMessage = "Login berhasil!";
                    redirectUrl = "../../pages/index.php";
            }

            Swal.fire({
                icon: 'success',
                title: 'Login Berhasil',
                text: successMessage,
                confirmButtonColor: '#2563eb',
                timer: 1500,
                showConfirmButton: true
            }).then(() => {
                // Simpan session ke localStorage/sessionStorage
                sessionStorage.setItem('user_login', JSON.stringify({
                    login: true,
                    id_user: user.id_user,
                    email: user.email,
                    nama: user.nama,
                    role: user.role
                }));
                
                // Redirect ke halaman sesuai role
                // window.location.href = redirectUrl;
                
                // Untuk demo, tampilkan dashboard di halaman yang sama
                showDashboard(user);
            });
        });

        // Fungsi show dashboard (opsional untuk demo)
        function showDashboard(user) {
            const card = document.querySelector('.login-card');
            
            let dashboardHtml = '';
            
            if (user.role === 'admin') {
                dashboardHtml = `
                    <div style="text-align: center;">
                        <i class="bi bi-shield-lock-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Admin</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Kelola Data User</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Kelola Alat Wedding</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Laporan Transaksi</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Pengaturan Sistem</p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            } else if (user.role === 'petugas') {
                dashboardHtml = `
                    <div style="text-align: center;">
                        <i class="bi bi-person-badge-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Dashboard Petugas</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Verifikasi Peminjaman</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Update Status Alat</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Jadwal Pengembalian</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Monitoring Peminjaman</p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            } else {
                dashboardHtml = `
                    <div style="text-align: center;">
                        <i class="bi bi-box-seam-fill" style="font-size: 50px; color: #2563eb;"></i>
                        <h3 class="fw-bold mt-2">Daftar Alat Wedding</h3>
                        <p class="text-muted">Selamat datang, ${user.nama}!</p>
                        <hr>
                        <div class="text-start">
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Lihat Katalog Alat</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Ajukan Peminjaman</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Riwayat Sewa</p>
                            <p><i class="bi bi-check-circle-fill text-success me-2"></i> Pembayaran</p>
                        </div>
                        <button onclick="logout()" class="btn btn-danger w-100 mt-3">Logout</button>
                    </div>
                `;
            }
            
            card.innerHTML = dashboardHtml;
        }

        // Fungsi logout
        function logout() {
            sessionStorage.removeItem('user_login');
            location.reload();
        }

        // Tombol register
        document.getElementById('registerBtn').addEventListener('click', function(e) {
            e.preventDefault();
            Swal.fire({
                title: 'Buat Akun Baru',
                text: 'Silakan hubungi administrator untuk mendaftar akun baru.',
                icon: 'info',
                confirmButtonText: 'Mengerti',
                confirmButtonColor: '#2563eb'
            });
        });

        // Cek apakah sudah login sebelumnya
        const savedSession = sessionStorage.getItem('user_login');
        if (savedSession) {
            const user = JSON.parse(savedSession);
            if (user.login) {
                showDashboard(user);
            }
        }
    </script>

</body>

</html>
